<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            z-index: -2;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 550px;
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-icon {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #1a1a2e;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            font-weight: 400;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-row-full {
            grid-column: 1 / -1;
        }

        label {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        label i {
            margin-right: 8px;
            color: #667eea;
            font-size: 12px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="tel"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        input[type="text"]:hover,
        input[type="email"]:hover,
        input[type="password"]:hover,
        input[type="tel"]:hover,
        select:hover {
            border-color: #667eea;
        }

        /* Password strength indicator */
        .password-requirements {
            font-size: 12px;
            margin-top: 12px;
            background: #f0f2f5;
            padding: 12px;
            border-radius: 8px;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin: 6px 0;
            color: #666;
            transition: all 0.3s ease;
        }

        .requirement .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-right: 8px;
            font-size: 10px;
            font-weight: bold;
            background: #e0e0e0;
            color: #999;
        }

        .requirement.met .icon {
            background: #4caf50;
            color: white;
        }

        .requirement.met {
            color: #4caf50;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .checkbox-group:hover {
            background: #f0f2f5;
        }

        input[type="checkbox"] {
            margin-right: 12px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
            font-size: 14px;
            color: #555;
            text-transform: none;
            letter-spacing: normal;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 6px;
            display: none;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .error-message::before {
            content: '⚠ ';
            margin-right: 5px;
        }

        .error-message.show {
            display: flex;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        input.error,
        select.error {
            border-color: #f44336 !important;
            background: #ffebee !important;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
            z-index: -1;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(-1px);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #667eea;
            transition: width 0.3s ease;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        .success-message {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-message.show {
            display: block;
        }

        .success-message i {
            margin-right: 8px;
            font-size: 18px;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #ddd;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-step {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            margin: 0 5px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .progress-step.active {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 5px;
            }

            .header {
                margin-bottom: 25px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
                margin-bottom: 15px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            button {
                padding: 12px;
                font-size: 14px;
            }

            .progress-indicator {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-user-check header-icon"></i>
            <h1>Create Account</h1>
            <p class="subtitle">Join us today and start your journey</p>
        </div>

        <div class="progress-indicator">
            <div class="progress-step active"></div>
            <div class="progress-step"></div>
            <div class="progress-step"></div>
        </div>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i> Account created successfully! Redirecting...
        </div>

        <form id="registrationForm">
            <!-- Personal Information -->
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">
                        <i class="fas fa-user"></i> First Name
                    </label>
                    <input type="text" id="firstName" name="firstName" placeholder="John" required>
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="lastName">
                        <i class="fas fa-user"></i> Last Name
                    </label>
                    <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
                    <div class="error-message"></div>
                </div>
            </div>

            <!-- Email & Contact -->
            <div class="form-group form-row-full">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
                <div class="error-message"></div>
            </div>

            <div class="form-group form-row-full">
                <label for="phone">
                    <i class="fas fa-phone"></i> Phone Number
                </label>
                <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
                <div class="error-message"></div>
            </div>

            <!-- Username -->
            <div class="form-group form-row-full">
                <label for="username">
                    <i class="fas fa-at"></i> Username
                </label>
                <input type="text" id="username" name="username" placeholder="Choose a unique username" required>
                <div class="error-message"></div>
            </div>

            <!-- Password -->
            <div class="form-group form-row-full">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" id="password" name="password" placeholder="Enter a strong password" required>
                <div class="error-message"></div>
                <div class="password-requirements">
                    <div class="requirement unmet" id="lengthReq">
                        <span class="icon">✓</span> At least 8 characters
                    </div>
                    <div class="requirement unmet" id="uppercaseReq">
                        <span class="icon">✓</span> One uppercase letter
                    </div>
                    <div class="requirement unmet" id="lowercaseReq">
                        <span class="icon">✓</span> One lowercase letter
                    </div>
                    <div class="requirement unmet" id="numberReq">
                        <span class="icon">✓</span> One number
                    </div>
                    <div class="requirement unmet" id="specialReq">
                        <span class="icon">✓</span> One special character (!@#$%^&*)
                    </div>
                </div>
            </div>

            <div class="form-group form-row-full">
                <label for="confirmPassword">
                    <i class="fas fa-lock"></i> Confirm Password
                </label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                <div class="error-message"></div>
            </div>

            <!-- Location -->
            <div class="form-group form-row-full">
                <label for="country">
                    <i class="fas fa-globe"></i> Country
                </label>
                <select id="country" name="country" required>
                    <option value="">Select a country</option>
                    <option value="US">United States</option>
                    <option value="CA">Canada</option>
                    <option value="UK">United Kingdom</option>
                    <option value="AU">Australia</option>
                    <option value="IN">India</option>
                    <option value="NG">Nigeria</option>
                    <option value="DE">Germany</option>
                    <option value="FR">France</option>
                    <option value="JP">Japan</option>
                    <option value="BR">Brazil</option>
                </select>
                <div class="error-message"></div>
            </div>

            <!-- Agreements -->
            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">
                    <i class="fas fa-check"></i> I agree to the Terms of Service and Privacy Policy
                </label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">
                    <i class="fas fa-bell"></i> Subscribe to our newsletter for updates and offers
                </label>
            </div>

            <button type="submit">
                <i class="fas fa-arrow-right"></i> Create Account
            </button>

            <p class="login-link">
                Already have an account? <a href="login.html">Sign in here</a>
            </p>
        </form>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const successMessage = document.getElementById('successMessage');

        // Password strength requirements
        const requirements = {
            length: document.getElementById('lengthReq'),
            uppercase: document.getElementById('uppercaseReq'),
            lowercase: document.getElementById('lowercaseReq'),
            number: document.getElementById('numberReq'),
            special: document.getElementById('specialReq')
        };

        // Validate password strength in real-time
        passwordInput.addEventListener('input', function() {
            validatePasswordStrength(this.value);
        });

        function validatePasswordStrength(password) {
            const tests = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*]/.test(password)
            };

            Object.keys(tests).forEach(key => {
                if (tests[key]) {
                    requirements[key].classList.remove('unmet');
                    requirements[key].classList.add('met');
                    requirements[key].querySelector('.icon').textContent = '✓';
                } else {
                    requirements[key].classList.remove('met');
                    requirements[key].classList.add('unmet');
                    requirements[key].querySelector('.icon').textContent = '✗';
                }
            });

            return Object.values(tests).every(test => test);
        }

        // Form validation
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(msg => msg.classList.remove('show'));
            document.querySelectorAll('input, select').forEach(field => field.classList.remove('error'));

            let isValid = true;

            // Validate first name
            const firstName = document.getElementById('firstName').value.trim();
            if (firstName.length < 2) {
                showError('firstName', 'First name must be at least 2 characters');
                isValid = false;
            }

            // Validate last name
            const lastName = document.getElementById('lastName').value.trim();
            if (lastName.length < 2) {
                showError('lastName', 'Last name must be at least 2 characters');
                isValid = false;
            }

            // Validate email
            const email = document.getElementById('email').value.trim();
            if (!isValidEmail(email)) {
                showError('email', 'Please enter a valid email address');
                isValid = false;
            }

            // Validate phone (optional but if provided, must be valid)
            const phone = document.getElementById('phone').value.trim();
            if (phone && !isValidPhone(phone)) {
                showError('phone', 'Please enter a valid phone number');
                isValid = false;
            }

            // Validate username
            const username = document.getElementById('username').value.trim();
            if (username.length < 3) {
                showError('username', 'Username must be at least 3 characters');
                isValid = false;
            }

            // Validate password strength
            const password = passwordInput.value;
            if (!validatePasswordStrength(password)) {
                showError('password', 'Password does not meet all requirements');
                isValid = false;
            }

            // Validate password match
            if (password !== confirmPasswordInput.value) {
                showError('confirmPassword', 'Passwords do not match');
                isValid = false;
            }

            // Validate country selection
            if (document.getElementById('country').value === '') {
                showError('country', 'Please select a country');
                isValid = false;
            }

            // Validate terms agreement
            if (!document.getElementById('terms').checked) {
                showError('terms', 'You must agree to the Terms of Service');
                isValid = false;
            }

            if (isValid) {
                // Show success message
                successMessage.classList.add('show');
                
                // Here you would typically send the data to a server
                const formData = {
                    firstName,
                    lastName,
                    email,
                    phone,
                    username,
                    country: document.getElementById('country').value,
                    newsletter: document.getElementById('newsletter').checked
                };

                console.log('Registration data:', formData);

                // Simulate form submission
                setTimeout(() => {
                    form.reset();
                    successMessage.classList.remove('show');
                    // Redirect to login or dashboard
                    // window.location.href = 'login.html';
                }, 2000);
            }
        });

        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            const errorMsg = field.parentElement.querySelector('.error-message') || field.closest('.checkbox-group')?.querySelector('.error-message');
            if (field) {
                field.classList.add('error');
            }
            if (errorMsg) {
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
            }
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function isValidPhone(phone) {
            const phoneRegex = /^\(?([0-9]{3})\)?[-. ]?([0-9]{3})[-. ]?([0-9]{4})$/;
            return phoneRegex.test(phone.replace(/\s+/g, ''));
        }
    </script>
</body>
</html>
