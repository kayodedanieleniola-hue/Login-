<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="tel"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row-full {
            grid-column: 1 / -1;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .requirement .icon {
            margin-right: 8px;
            font-weight: bold;
        }

        .requirement.met .icon {
            color: #4caf50;
        }

        .requirement.unmet .icon {
            color: #f44336;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
            font-size: 14px;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        input.error,
        select.error {
            border-color: #f44336 !important;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 25px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        
        <div class="success-message" id="successMessage">
            ✓ Account created successfully! Redirecting...
        </div>

        <form id="registrationForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required>
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>
                    <div class="error-message"></div>
                </div>
            </div>

            <div class="form-group form-row-full">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
                <div class="error-message"></div>
            </div>

            <div class="form-group form-row-full">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
                <div class="error-message"></div>
            </div>

            <div class="form-group form-row-full">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                <div class="error-message"></div>
            </div>

            <div class="form-group form-row-full">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <div class="error-message"></div>
                <div class="password-requirements">
                    <div class="requirement unmet" id="lengthReq">
                        <span class="icon">✗</span> At least 8 characters
                    </div>
                    <div class="requirement unmet" id="uppercaseReq">
                        <span class="icon">✗</span> One uppercase letter
                    </div>
                    <div class="requirement unmet" id="lowercaseReq">
                        <span class="icon">✗</span> One lowercase letter
                    </div>
                    <div class="requirement unmet" id="numberReq">
                        <span class="icon">✗</span> One number
                    </div>
                    <div class="requirement unmet" id="specialReq">
                        <span class="icon">✗</span> One special character (!@#$%^&*)
                    </div>
                </div>
            </div>

            <div class="form-group form-row-full">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
                <div class="error-message"></div>
            </div>

            <div class="form-group form-row-full">
                <label for="country">Country</label>
                <select id="country" name="country" required>
                    <option value="">Select a country</option>
                    <option value="US">United States</option>
                    <option value="CA">Canada</option>
                    <option value="UK">United Kingdom</option>
                    <option value="AU">Australia</option>
                    <option value="IN">India</option>
                    <option value="NG">Nigeria</option>
                    <option value="DE">Germany</option>
                    <option value="FR">France</option>
                    <option value="JP">Japan</option>
                    <option value="BR">Brazil</option>
                </select>
                <div class="error-message"></div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to our newsletter</label>
            </div>

            <button type="submit">Create Account</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const successMessage = document.getElementById('successMessage');

        // Password strength requirements
        const requirements = {
            length: document.getElementById('lengthReq'),
            uppercase: document.getElementById('uppercaseReq'),
            lowercase: document.getElementById('lowercaseReq'),
            number: document.getElementById('numberReq'),
            special: document.getElementById('specialReq')
        };

        // Validate password strength in real-time
        passwordInput.addEventListener('input', function() {
            validatePasswordStrength(this.value);
        });

        function validatePasswordStrength(password) {
            const tests = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*]/.test(password)
            };

            Object.keys(tests).forEach(key => {
                if (tests[key]) {
                    requirements[key].classList.remove('unmet');
                    requirements[key].classList.add('met');
                    requirements[key].querySelector('.icon').textContent = '✓';
                } else {
                    requirements[key].classList.remove('met');
                    requirements[key].classList.add('unmet');
                    requirements[key].querySelector('.icon').textContent = '✗';
                }
            });

            return Object.values(tests).every(test => test);
        }

        // Form validation
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(msg => msg.classList.remove('show'));
            document.querySelectorAll('input, select').forEach(field => field.classList.remove('error'));

            let isValid = true;

            // Validate first name
            const firstName = document.getElementById('firstName').value.trim();
            if (firstName.length < 2) {
                showError('firstName', 'First name must be at least 2 characters');
                isValid = false;
            }

            // Validate last name
            const lastName = document.getElementById('lastName').value.trim();
            if (lastName.length < 2) {
                showError('lastName', 'Last name must be at least 2 characters');
                isValid = false;
            }

            // Validate email
            const email = document.getElementById('email').value.trim();
            if (!isValidEmail(email)) {
                showError('email', 'Please enter a valid email address');
                isValid = false;
            }

            // Validate phone (optional but if provided, must be valid)
            const phone = document.getElementById('phone').value.trim();
            if (phone && !isValidPhone(phone)) {
                showError('phone', 'Please enter a valid phone number');
                isValid = false;
            }

            // Validate username
            const username = document.getElementById('username').value.trim();
            if (username.length < 3) {
                showError('username', 'Username must be at least 3 characters');
                isValid = false;
            }

            // Validate password strength
            const password = passwordInput.value;
            if (!validatePasswordStrength(password)) {
                showError('password', 'Password does not meet all requirements');
                isValid = false;
            }

            // Validate password match
            if (password !== confirmPasswordInput.value) {
                showError('confirmPassword', 'Passwords do not match');
                isValid = false;
            }

            // Validate country selection
            if (document.getElementById('country').value === '') {
                showError('country', 'Please select a country');
                isValid = false;
            }

            // Validate terms agreement
            if (!document.getElementById('terms').checked) {
                alert('You must agree to the Terms of Service and Privacy Policy');
                isValid = false;
            }

            if (isValid) {
                // Show success message
                successMessage.classList.add('show');
                
                // Here you would typically send the data to a server
                const formData = {
                    firstName,
                    lastName,
                    email,
                    phone,
                    username,
                    country: document.getElementById('country').value,
                    newsletter: document.getElementById('newsletter').checked
                };

                console.log('Registration data:', formData);

                // Simulate form submission
                setTimeout(() => {
                    form.reset();
                    successMessage.classList.remove('show');
                    // Redirect to login or dashboard
                    // window.location.href = 'login.html';
                }, 2000);
            }
        });

        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            const errorMsg = field.parentElement.querySelector('.error-message');
            field.classList.add('error');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function isValidPhone(phone) {
            const phoneRegex = /^\(?([0-9]{3})\)?[-. ]?([0-9]{3})[-. ]?([0-9]{4})$/;
            return phoneRegex.test(phone.replace(/\s+/g, ''));
        }
    </script>
</body>
</html>
